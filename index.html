<!DOCTYPE html>
<html>
<head>
  <title>DevOps Practice App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>🚀 DevOps Practice App</h1>

  <div class="top-bar">
    <select id="topicSelect">
      <option value="docker">🐳 Docker</option>
      <option value="github">🐙 GitHub</option>
      <option value="kubernetes">☸️ Kubernetes</option>
    </select>
    <span id="progress" class="progress-badge">Q 1 / 2</span>
  </div>

  <div class="score-board">
    <div class="score-item correct-score">
      <span class="score-label">✅ Correct</span>
      <span id="correctCount" class="score-value">0</span>
      <span id="correctPercent" class="score-percent">(0%)</span>
    </div>
    <div class="score-item wrong-score">
      <span class="score-label">❌ Wrong</span>
      <span id="wrongCount" class="score-value">0</span>
      <span id="wrongPercent" class="score-percent">(0%)</span>
    </div>
    <div class="score-item total-score">
      <span class="score-label">📊 Total</span>
      <span id="totalCount" class="score-value">0</span>
    </div>
  </div>

  <div class="card">
    <h2 id="question">Question appears here</h2>

    <input type="text" id="answerInput" placeholder="Type your answer..." autocomplete="off">

    <div class="btn-group">
      <button id="submitBtn" onclick="checkAnswer()">Submit</button>
      <button id="nextBtn" onclick="nextQuestion()">Next →</button>
      <button id="resetBtn" onclick="resetScore()">Reset Score</button>
    </div>

    <p id="result"></p>
  </div>

  <div class="progress-bar-container">
    <div id="progressBar" class="progress-bar"></div>
  </div>

  <!-- Learning Growth Dashboard -->
  <div class="dashboard">
    <div class="dashboard-header">
      <h2>📈 Learning Growth Dashboard</h2>
      <div class="dashboard-actions">
        <button id="saveSessionBtn" onclick="saveSession()">💾 Save Session</button>
        <button id="resetChartBtn" onclick="resetChart()">🗑️ Reset Chart</button>
      </div>
    </div>

    <div class="chart-toggle">
      <button class="toggle-btn active" id="barToggle" onclick="setChartType('bar')">Bar Graph</button>
      <button class="toggle-btn" id="lineToggle" onclick="setChartType('line')">Trend Line</button>
    </div>

    <div class="chart-container">
      <canvas id="growthChart" width="700" height="300"></canvas>
    </div>

    <div class="dashboard-stats">
      <div class="stat-card">
        <span class="stat-label">Total Sessions</span>
        <span id="totalSessions" class="stat-value">0</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">Best Score</span>
        <span id="bestScore" class="stat-value">0%</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">Average Score</span>
        <span id="avgScore" class="stat-value">0%</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">Current Streak</span>
        <span id="streak" class="stat-value">0 days</span>
      </div>
    </div>
  </div>

  <script src="questions.js"></script>
  <script src="script.js"></script>

</body>
</html>
